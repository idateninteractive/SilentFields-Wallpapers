<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Team Games Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background-color 0.3s; }
        body { background-color: #121212; color: #ffffff; padding-bottom: 50px; }

        /* --- Header / Compact Banner --- */
        .top-bar { 
            background-image: url('https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/33100/page_bg_raw.jpg?t=1773835157');
            background-repeat: no-repeat;
            background-position: center center; /* Image center se shuru hogi */
            background-size: cover;
            background-color: #000;
            
            /* Banner ki height aur chhota kar di */
            height: 80px; 
            
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 3px solid #ff4500; 
        }

        .top-bar h2 {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-radius: 4px;
            color: #ff4500;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* --- Theme Toggle --- */
        .theme-toggle {
            position: fixed; top: 10px; right: 10px; z-index: 2000;
            padding: 5px 10px; background-color: #ff4500; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        /* --- Grid & Content Styles --- */
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .game-card { background: #1e1e1e; padding: 15px; border-radius: 10px; cursor: pointer; border: 1px solid #333; }
        .game-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 5px; }
        .detail-view { display: none; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #444; }
        .download-link-btn { display: none; background: #28a745; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .back-btn { background: none; border: none; color: #ff4500; cursor: pointer; margin-bottom: 15px; }

        /* Light Mode */
        body.light-mode { background-color: #f0f0f0; color: #121212; }
        body.light-mode .game-card { background: #fff; border-color: #ccc; }
        body.light-mode .detail-view { background: #fff; border-color: #ccc; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Light Mode</button>

    <div class="top-bar">
        <h2>SIGMA TEAM GAMES</h2>
    </div>

    <div class="container">
        <div id="home-view" class="grid">
            <div class="game-card" onclick="showGame('game1')"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1007400/capsule_616x353.jpg?t=1700734144"><h3>Alien Shooter 2 - The Legend</h3></div>
            <div class="game-card" onclick="showGame('game2')"><img src="https://steamah.com/wp-content/uploads/2022/06/Alien-Shooter-2-New-Era.jpg"><h3>Alien Shooter 2 - New Era</h3></div>
            <div class="game-card" onclick="showGame('game3')"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBPt1Dz4U-LOiGVMTnweg4pmp3OpETUXaJRDL0t4_qhw&s=10"><h3>Alien Shooter Vengeance</h3></div>
            <div class="game-card" onclick="showGame('game4')"><img src="https://tse3.mm.bing.net/th/id/OIP.z2q8Co1vLTm_JBKwfqOLLAHaDb?cb=thfvnextfalcon4&rs=1&pid=ImgDetMain&o=7&rm=3"><h3>Alien Shooter 2 Reloaded</h3></div>
            <div class="game-card" onclick="showGame('game5')"><img src="https://cdn.akamai.steamstatic.com/steam/apps/951530/capsule_616x353.jpg?t=1655832408"><h3>Alien Shooter – Last Hope</h3></div>
            <div class="game-card" onclick="showGame('game6')"><img src="https://cdn.dlcompare.com/game_tetiere/upload/gameimage/file/10417.jpeg.webp"><h3>Zombie Shooter 2</h3></div>
        </div>

        <div id="detail-view" class="detail-view">
            <button class="back-btn" onclick="goBack()">← Back to Library</button>
            <div id="game-content"></div>
        </div>
    </div>

    <script>
        const VALID_CODES = ["ASWFAN", "ASWORD", "ASFANG"];
        const games = {
            'game1': { title: "Alien Shooter 2 - The Legend", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1007400/capsule_616x353.jpg?t=1700734144", link: "https://www.4fnet.org/goto/aHR0cHM6Ly9tZWdhdXAubmV0LzJhNTZlZTU2ZjY2YmU0NmQ1ZDIxYjZhMzdkOWJhMjRmL0FsaWVuLlNob290ZXIuMi5UaGUuTGVnZW5kLnYxLjMuMi5yYXI=" },
            'game2': { title: "Alien Shooter 2 - New Era", img: "https://steamah.com/wp-content/uploads/2022/06/Alien-Shooter-2-New-Era.jpg", link: "https://uploadhaven.com/download/7af43982a4d288f1979164a4930c806c" },
            'game3': { title: "Alien Shooter Vengeance", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBPt1Dz4U-LOiGVMTnweg4pmp3OpETUXaJRDL0t4_qhw&s=10", link: "https://www.4fnet.org/goto/aHR0cHM6Ly9waXhlbGRyYWluLmNvbS91L3RLbmRSZ1A5" },
            'game4': { title: "Alien Shooter 2 Reloaded", img: "https://tse3.mm.bing.net/th/id/OIP.z2q8Co1vLTm_JBKwfqOLLAHaDb?cb=thfvnextfalcon4&rs=1&pid=ImgDetMain&o=7&rm=3", link: "https://www.4fnet.org/goto/aHR0cHM6Ly9tZWdhdXAubmV0L2QxYTUxMmVmNDgzNjk2NTdhY2FlYTdhYjE3Yjk4MWJkL0FsaWVuU2hvb3QyUmVsb2FkZWRHT0cucmFy" },
            'game5': { title: "Alien Shooter – Last Hope", img: "https://cdn.akamai.steamstatic.com/steam/apps/951530/capsule_616x353.jpg?t=1655832408", link: "https://www.4fnet.org/goto/aHR0cHM6Ly9waXhlbGRyYWluLmNvbS91L2RpOTk2bnh2" },
            'game6': { title: "Zombie Shooter 2", img: "https://cdn.dlcompare.com/game_tetiere/upload/gameimage/file/10417.jpeg.webp", link: "https://www.4fnet.org/goto/aHR0cHM6Ly9waXhlbGRyYWluLmNvbS91L2pBam8yN0Ez" }
        };

        function showGame(id) {
            const game = games[id];
            document.getElementById('game-content').innerHTML = `
                <img src="${game.img}" style="width:100%; border-radius: 5px;">
                <h1 style="margin-top:15px;">${game.title}</h1>
                <input type="text" id="promo-input" placeholder="ENTER CODE" onkeyup="checkCode('${id}')" style="padding:8px; width:100%; margin:10px 0;">
                <br><a id="download-link-${id}" href="${game.link}" target="_blank" class="download-link-btn" style="display:none;">UNLOCK & DOWNLOAD</a>
            `;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
        }

        function checkCode(id) {
            const input = document.getElementById('promo-input').value.toUpperCase();
            document.getElementById('download-link-' + id).style.display = VALID_CODES.includes(input) ? 'inline-block' : 'none';
        }

        function goBack() {
            document.getElementById('home-view').style.display = 'grid';
            document.getElementById('detail-view').style.display = 'none';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeBtn').innerText = document.body.classList.contains('light-mode') ? "Dark Mode" : "Light Mode";
        }
    </script>
</body>
</html>
