<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Team Wallpapers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #ffffff; }

        .top-bar {
            background-image: linear-gradient(rgba(0, 0, 0, 0.623), rgba(0, 0, 0, 0.6)), url('https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/33100/page_bg_raw.jpg?t=1773835157');
            background-size: cover; background-position: center;
            padding: 15px 0; display: flex; justify-content: center; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .top-logo { height: 60px; object-fit: contain; filter: drop-shadow(0px 2px 8px rgba(0,0,0,0.8)); }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .wallpaper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .wallpaper-card { background-color: #1e1e1e; border-radius: 8px; overflow: hidden; transition: 0.3s; }
        .wallpaper-card:hover { transform: translateY(-5px); }
        .wallpaper-img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .wallpaper-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .download-btn { background-color: #ffffff; color: #000000; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .download-btn:hover { background-color: #cccccc; }
    </style>
</head>
<body>

    <div class="top-bar">
        <img src="https://shared.steamstatic.com/store_item_assets/steam/apps/951530/logo.png?t=1687441285" alt="Sigma Team Logo" class="top-logo">
    </div>

    <div class="container">
        <h2 class="section-title">Latest Wallpapers</h2>
        <div class="wallpaper-grid">
            
            <div class="wallpaper-card">
                <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/33100/page_bg_raw.jpg?t=1773835157" class="wallpaper-img">
                <div class="wallpaper-info">
                    <span>Alien Shooter Vibe</span>
                    <button class="download-btn" data-url="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/33100/page_bg_raw.jpg?t=1773835157">Download</button>
                </div>
            </div>

            <div class="wallpaper-card">
                <img src="https://external-preview.redd.it/the-legendary-game-from-your-and-my-childhood-is-finally-v0-k8uz-yEq35tb2woVXFSzV4fH7pPk9suk1sWCxhnoACk.jpg?auto=webp&s=2a5b934b2db1dbaff260c53f090eb6561236d65f" class="wallpaper-img">
                <div class="wallpaper-info">
                    <span>Alien Shooter Campaign</span>
                    <button class="download-btn" data-url="https://external-preview.redd.it/the-legendary-game-from-your-and-my-childhood-is-finally-v0-k8uz-yEq35tb2woVXFSzV4fH7pPk9suk1sWCxhnoACk.jpg?auto=webp&s=2a5b934b2db1dbaff260c53f090eb6561236d65f">Download</button>
                </div>
            </div>

            <div class="wallpaper-card">
                <img src="https://cdn.dlcompare.com/game_tetiere/upload/gameimage/file/24316.jpeg.webp" class="wallpaper-img">
                <div class="wallpaper-info">
                    <span>Alien Shooter Action</span>
                    <button class="download-btn" data-url="https://cdn.dlcompare.com/game_tetiere/upload/gameimage/file/24316.jpeg.webp">Download</button>
                </div>
            </div>

            <div class="wallpaper-card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTri7-hG-l0vVDZ4aYl_eg63BbXxjux7MNWumta8uwRLDrjMm2I5hhfN3ml&s=10" class="wallpaper-img">
                <div class="wallpaper-info">
                    <span>Alien Shooter Classic</span>
                    <button class="download-btn" data-url="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTri7-hG-l0vVDZ4aYl_eg63BbXxjux7MNWumta8uwRLDrjMm2I5hhfN3ml&s=10">Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.download-btn').forEach(button => {
            button.addEventListener('click', async () => {
                const imageUrl = button.getAttribute('data-url');
                try {
                    const response = await fetch(imageUrl);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'wallpaper.jpg';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                } catch (error) {
                    window.open(imageUrl, '_blank'); // Agar direct download fail ho, toh tab mein open kare
                }
            });
        });
    </script>
</body>
</html>
